name: Release

# Tag strategy (one tag per releasable artifact):
#   sdk/python/v0.2.0   → publishes diogenes-sdk to PyPI
#   integrations/openai/v0.1.0 → publishes diogenes-openai to PyPI
#   cli/v0.1.0          → builds Go binary + creates GitHub release
#
# Create a release:
#   git tag sdk/python/v0.2.0
#   git push origin sdk/python/v0.2.0

on:
  push:
    tags:
      - "sdk/python/v*"
      - "integrations/openai/v*"
      - "cli/v*"

jobs:
  # ── PyPI: diogenes-sdk ───────────────────────────────────────────────────────
  release-sdk-python:
    name: Publish diogenes-sdk to PyPI
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/sdk/python/v')
    environment: pypi
    permissions:
      id-token: write   # required for PyPI trusted publishing

    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-sdk-python-${{ hashFiles('sdk/python/pyproject.toml') }}

      - name: Install
        run: mise run //sdk/python:install

      - name: Run tests before publishing
        run: mise run //sdk/python:test

      - name: Build
        run: mise run //sdk/python:build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdk/python/dist/

  # ── PyPI: diogenes-openai ────────────────────────────────────────────────────
  release-integrations-openai:
    name: Publish diogenes-openai to PyPI
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/integrations/openai/v')
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-openai-${{ hashFiles('integrations/openai/pyproject.toml') }}

      - name: Install
        run: mise run //integrations/openai:install

      - name: Test
        run: mise run //integrations/openai:test

      - name: Build
        run: mise run //integrations/openai:build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: integrations/openai/dist/

  # ── GitHub Release: Go CLI ───────────────────────────────────────────────────
  release-cli:
    name: Build and release CLI binaries
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/cli/v')
    permissions:
      contents: write   # required to create GitHub releases

    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: go-${{ hashFiles('cli/go.mod') }}

      - name: Install Go dependencies
        run: mise run //cli:install

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${GITHUB_REF_NAME#cli/}
          cd cli
          go build \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o bin/diogenes-${{ matrix.os }}-${{ matrix.arch }} \
            ./cmd/diogenes

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: diogenes-${{ matrix.os }}-${{ matrix.arch }}
          path: cli/bin/diogenes-${{ matrix.os }}-${{ matrix.arch }}

  # Create the GitHub release once all matrix builds complete
  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: release-cli
    if: startsWith(github.ref, 'refs/tags/cli/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: cli/bin/
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: CLI ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            ## Diogenes CLI ${{ github.ref_name }}

            ### Installation

            **macOS (Apple Silicon)**
            ```bash
            curl -Lo diogenes https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/diogenes-darwin-arm64
            chmod +x diogenes && sudo mv diogenes /usr/local/bin/
            ```

            **macOS (Intel)**
            ```bash
            curl -Lo diogenes https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/diogenes-darwin-amd64
            chmod +x diogenes && sudo mv diogenes /usr/local/bin/
            ```

            **Linux (amd64)**
            ```bash
            curl -Lo diogenes https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/diogenes-linux-amd64
            chmod +x diogenes && sudo mv diogenes /usr/local/bin/
            ```
          files: cli/bin/diogenes-*
          generate_release_notes: true